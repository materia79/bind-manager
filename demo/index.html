<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bind Manager — Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #c8c8e0;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Simulated game canvas backdrop */
    #game-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 50% 40%, #0f2a4a 0%, #050510 70%);
    }

    /* Grid overlay for depth cue */
    #game-canvas::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(80,120,255,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(80,120,255,0.07) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── HUD: top-left action log ── */
    #log {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 100;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 14px;
      min-width: 280px;
      max-height: 220px;
      overflow-y: auto;
      backdrop-filter: blur(8px);
    }

    #log-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #5c7cfa;
      margin-bottom: 6px;
    }

    .log-entry {
      font-size: 12px;
      color: #a0a0c0;
      padding: 2px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .log-entry:last-child { border-bottom: none; }
    .log-entry.pressed  { color: #60d080; }
    .log-entry.released { color: #e06060; }
    .log-entry.held     { color: #a060e0; }
    .log-entry.changed  { color: #ffa040; }
    .log-entry.info     { color: #7090c0; }

    /* ── HUD: top-right controls ── */
    #controls {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
    }

    .hud-btn {
      background: rgba(92, 124, 250, 0.2);
      border: 1px solid rgba(92, 124, 250, 0.5);
      border-radius: 7px;
      color: #c0ccff;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      padding: 7px 16px;
      transition: background 0.15s, border-color 0.15s;
    }
    .hud-btn:hover {
      background: rgba(92, 124, 250, 0.4);
      border-color: #5c7cfa;
    }

    #hint-toggle-btn {
      background: rgba(40, 140, 80, 0.2);
      border-color: rgba(40, 200, 100, 0.4);
      color: #80dca0;
    }
    #hint-toggle-btn:hover {
      background: rgba(40, 140, 80, 0.4);
      border-color: rgba(40,200,100,0.8);
    }

    /* ── Centre title ── */
    #center-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      z-index: 50;
    }
    #center-text h1 {
      font-size: 28px;
      font-weight: 700;
      color: rgba(200, 210, 255, 0.9);
      text-shadow: 0 0 40px rgba(92,124,250,0.6);
      margin-bottom: 8px;
    }
    #center-text p {
      font-size: 13px;
      color: rgba(150, 160, 200, 0.7);
    }
    #center-text kbd {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 12px;
      font-family: inherit;
    }
  </style>
</head>
<body>

  <div id="game-canvas"></div>

  <div id="log">
    <div id="log-title">Event Log</div>
  </div>

  <div id="controls">
    <button class="hud-btn" id="open-btn">⚙ Key Bindings</button>
    <button class="hud-btn" id="hint-toggle-btn">👁 Toggle Hints</button>
    <button class="hud-btn" id="reset-btn">↺ Reset All</button>
  </div>

  <div id="center-text">
    <h1>Bind Manager Demo</h1>
    <p>Press <kbd>F5</kbd> or click "Key Bindings" to open the modal.</p>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
